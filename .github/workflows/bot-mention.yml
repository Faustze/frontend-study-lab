name: Bot on mention
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  bot:
    # реагируем только на тебя, чтобы чужие не могли командовать ботом
    if: >
      github.actor == 'Faustze' &&
      contains(github.event.comment.body || github.event.issue.body, '@faustze-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_PAT }}
          trigger_phrase: "@faustze-bot"
          claude_args: "--model claude-sonnet-5 --max-turns 30"
